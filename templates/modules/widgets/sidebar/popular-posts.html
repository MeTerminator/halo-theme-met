<div
  class="card-base onload-animation mb-4 pb-4 transition-all duration-500 hover:shadow-md"
  style="animation-delay: 150ms"
>
  <h2
    class="relative mb-2 ml-8 mt-4 text-lg font-bold text-neutral-900 transition before:absolute before:left-[-16px] before:top-[5.5px] before:h-4 before:w-1 before:rounded-md before:bg-[var(--primary)] dark:text-neutral-100"
  >
    <th:block th:text="#{widget.popularPosts.title}"></th:block>
  </h2>

  <div class="px-4">
    <ul
      role="list"
      class="flex flex-col gap-1"
      th:with="posts = ${postFinder.list({page: 1,size: 10,sort: {'stats.visit,desc'}})}"
    >
      <li th:each="post : ${posts}">
        <a
          th:href="@{${post.status.permalink}}"
          th:title="${post.spec.title}"
          class="group flex items-center justify-between rounded-lg py-2 pl-3 pr-2 transition hover:bg-[var(--btn-plain-bg-hover)] active:scale-[0.98]"
        >
          <div class="flex flex-col gap-0.5 overflow-hidden">
            <h3
              class="line-clamp-1 text-sm font-bold text-black/75 transition group-hover:text-[var(--primary)] dark:text-white/75"
            >
              [[${post.spec.title}]]
            </h3>
            <p
              class="text-[0.7rem] tabular-nums opacity-40"
              th:text="${#dates.format(post.spec.publishTime,'yyyy-MM-dd')}"
            ></p>
          </div>

          <div
            class="ml-4 flex shrink-0 items-center gap-1 text-[0.75rem] opacity-30 transition group-hover:opacity-60"
          >
            <span class="icon-[tabler--eye]"></span>
            <span th:text="${post.stats.visit ?: 0}" class="tabular-nums"></span>
          </div>
        </a>
      </li>
    </ul>
  </div>
</div>
